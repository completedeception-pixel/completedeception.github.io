<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flagle 2 — Guess the Flag</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');
 
    /* -----------------------------------------------------------
       Design tokens
    ----------------------------------------------------------- */
    :root {
      --bg: #14151a;
      --card: #1c1e26;
      --border: #33353f;
      --ink: #eae8e1;
      --muted: #9b988e;
      --accent: #d9a84a;
      --accent-dark: #f0bf63;
      --wrong: #e0574a;
      --right: #4fcf85;
      --tile-back: #2c2f38;
 
      --font-mono: 'JetBrains Mono', monospace;
      --radius-sm: 7px;
      --radius-md: 8px;
      --radius-lg: 10px;
    }
 
    /* -----------------------------------------------------------
       Reset & base
    ----------------------------------------------------------- */
    * {
      box-sizing: border-box;
    }
 
    body {
      display: flex;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 36px 16px;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-mono);
    }
 
    .hidden {
      display: none !important;
    }
 
    /* -----------------------------------------------------------
       Layout
    ----------------------------------------------------------- */
    .card {
      width: 100%;
      max-width: 460px;
    }
 
    header {
      margin-bottom: 20px;
      text-align: center;
    }
 
    h1 {
      margin: 0 0 4px;
      font-family: var(--font-mono);
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--ink);
    }
 
    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
    }
 
    .credit {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.78rem;
      opacity: 0.75;
    }
 
    .status-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 6px 14px;
      margin: 18px 0 10px;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 500;
    }
 
    .status-row b {
      color: var(--ink);
    }
 
    .streak-indicator b {
      color: var(--accent);
    }
 
    /* -----------------------------------------------------------
       Flag stage & flip tiles
    ----------------------------------------------------------- */
    .flag-stage {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 2;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: #111;
      box-shadow: 0 6px 20px rgba(20, 20, 20, 0.08);
      transition: aspect-ratio 0.25s ease;
    }
 
    .flag-full {
      position: absolute;
      inset: 0;
    }
 
    .flag-full img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
 
    .tiles-grid {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
    }
 
    .tile {
      overflow: hidden;
      perspective: 700px;
      /* Overlap neighboring tiles by a hair. Browser zoom levels that
         aren't a clean multiple of the device pixel ratio (e.g. 90%,
         110%) can leave a subpixel rounding gap between grid tracks,
         letting the flag underneath peek through. A small negative
         margin makes each tile bleed slightly into its neighbors,
         which reliably covers that gap at any zoom level. The 1px
         bleed at the outer edge of the whole grid is clipped by
         .flag-stage's overflow:hidden, so nothing looks different
         at normal zoom. */
      margin: -1px;
    }
 
    .tile-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.65s cubic-bezier(0.4, 0.2, 0.2, 1);
    }
 
    .tile-inner.flipped {
      transform: rotateY(180deg);
    }
 
    .tile-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
    }
 
    .tile-front {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--tile-back), #1a1c22);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }
 
    .tile-front::after {
      content: '?';
      font-family: var(--font-mono);
      font-size: 1.3rem;
      font-weight: 700;
      color: rgba(201, 162, 75, 0.55);
    }
 
    .tile-back {
      background: transparent;
      transform: rotateY(180deg);
    }
 
    /* -----------------------------------------------------------
       Guess form
    ----------------------------------------------------------- */
    .guess-row {
      display: flex;
      gap: 8px;
      margin: 18px 0 8px;
    }
 
    input[type="text"] {
      flex: 1;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--card);
      color: var(--ink);
      font-family: inherit;
      font-size: 1rem;
    }
 
    input[type="text"]:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }
 
    input[type="text"]:disabled {
      background: #22232b;
      color: var(--muted);
    }
 
    button {
      padding: 11px 18px;
      border: none;
      border-radius: var(--radius-md);
      background: var(--accent);
      color: #1c1a12;
      font-family: var(--font-mono);
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
    }
 
    button:hover:not(:disabled) {
      background: var(--accent-dark);
    }
 
    button:disabled {
      background: #3a3b42;
      color: #7a7870;
      cursor: default;
    }
 
    button.secondary {
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      background: transparent;
      color: var(--accent-dark);
      border: 1px solid var(--accent-dark);
    }
 
    button.secondary:hover {
      background: rgba(217, 168, 74, 0.1);
    }
 
    /* -----------------------------------------------------------
       Feedback message
    ----------------------------------------------------------- */
    .message {
      min-height: 28px;
      margin: 6px 0 14px;
      font-size: 0.95rem;
      font-weight: 500;
    }
 
    .message.wrong {
      color: var(--wrong);
    }
 
    .message.right {
      color: var(--right);
    }
 
    .message.hint {
      color: var(--muted);
      font-style: italic;
      font-weight: 400;
    }
 
    /* -----------------------------------------------------------
       Guess history
    ----------------------------------------------------------- */
    .history {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
 
    .history li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 12px;
      border: 1px solid #4a2c2a;
      border-radius: var(--radius-sm);
      background: #2b1e1e;
      color: #e39b93;
      font-size: 0.92rem;
    }
 
    .history li.correct {
      border-color: #2e4a37;
      background: #1c2b21;
      color: #8fd6a8;
    }
 
    .history li .mark {
      font-weight: 700;
    }
 
    /* -----------------------------------------------------------
       Reveal box
    ----------------------------------------------------------- */
    .reveal-box {
      margin-top: 6px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--card);
      text-align: center;
    }
 
    .reveal-box .name {
      font-family: var(--font-mono);
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--accent-dark);
    }
 
    .reveal-box .region {
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.88rem;
    }
 
    .load-error {
      padding: 16px;
      color: var(--wrong);
      font-size: 0.9rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <h1>FLAGLE 2</h1>
      <p class="subtitle">Guess the country from its flag</p>
      <p class="credit">Created by Crypt and Inco </p>
    </header>
 
    <div class="status-row">
      <span>Guess <b id="guessCount">0</b>/6</span>
      <span class="streak-indicator">🔥 Streak: <b id="streakCount">0</b></span>
      <span id="statusText">Segments hidden</span>
    </div>
 
    <div class="flag-stage">
      <div class="flag-full" id="flagFull"></div>
      <div class="tiles-grid" id="tilesGrid"></div>
    </div>
 
    <form class="guess-row" id="guessForm" autocomplete="off">
      <input
        type="text"
        id="guessInput"
        list="countryList"
        placeholder="Name the country..."
        aria-label="Country guess"
      >
      <datalist id="countryList"></datalist>
      <button type="submit">Guess</button>
    </form>
 
    <div class="message" id="message" role="status" aria-live="polite"></div>
 
    <ul class="history" id="history"></ul>
    <div class="reveal-box hidden" id="revealBox"></div>
 
    <button class="secondary hidden" id="newGameBtn" type="button">⟳ New Flag</button>
  </div>

    ];;
 
    /* =============================================================
       Constants & state
    ============================================================= */
    const MAX_TRIES = 6;
    const TILE_COUNT = 6;
    const HINT_AFTER_TRIES = 2;
    const STORAGE_KEY = 'flagleStreak';
    const DEFAULT_ASPECT_RATIO = '3 / 2';
    const FLAGCDN_PATTERN = /flagcdn\.com\/w\d+\/([a-z]{2})\.png$/i;
 
    let currentFlag = null;
    let triesUsed = 0;
    let isRoundOver = false;
    let tileRevealOrder = [];
    let streak = readStoredStreak();
 
    /* =============================================================
       DOM references
    ============================================================= */
    const dom = {
      flagFull: document.getElementById('flagFull'),
      flagStage: document.querySelector('.flag-stage'),
      tilesGrid: document.getElementById('tilesGrid'),
      guessCount: document.getElementById('guessCount'),
      streakCount: document.getElementById('streakCount'),
      statusText: document.getElementById('statusText'),
      message: document.getElementById('message'),
      history: document.getElementById('history'),
      revealBox: document.getElementById('revealBox'),
      form: document.getElementById('guessForm'),
      input: document.getElementById('guessInput'),
      submitButton: document.querySelector('#guessForm button[type="submit"]'),
      newGameButton: document.getElementById('newGameBtn'),
      countryList: document.getElementById('countryList'),
    };
 
    /* =============================================================
       Persistence helpers
    ============================================================= */
    function readStoredStreak() {
      try {
        return parseInt(localStorage.getItem(STORAGE_KEY), 10) || 0;
      } catch (err) {
        return 0; // localStorage unavailable (e.g. private browsing) — start at 0
      }
    }
 
    function writeStoredStreak(value) {
      try {
        localStorage.setItem(STORAGE_KEY, value);
      } catch (err) {
        // localStorage unavailable — streak still works for this session
      }
    }
 
    /* =============================================================
       Rendering helpers
    ============================================================= */
    function renderStreak() {
      dom.streakCount.textContent = streak;
    }
 
    function setMessage(text, variant) {
      dom.message.className = variant ? `message ${variant}` : 'message';
      dom.message.textContent = text;
    }
 
    function toggleVisible(el, isVisible) {
      el.classList.toggle('hidden', !isVisible);
    }
 
    function populateCountryList() {
      dom.countryList.innerHTML = FLAGS
        .map((flag) => `<option value="${flag.name}">`)
        .join('');
    }
 
    /* =============================================================
       Game setup
    ============================================================= */
    function shuffledIndices(count) {
      const indices = [...Array(count).keys()];
      for (let i = indices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
      }
      return indices;
    }
 
    function buildTiles() {
      dom.tilesGrid.innerHTML = '';
      for (let i = 0; i < TILE_COUNT; i++) {
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.innerHTML = `
          <div class="tile-inner" id="tile-${i}">
            <div class="tile-face tile-front"></div>
            <div class="tile-face tile-back"></div>
          </div>`;
        dom.tilesGrid.appendChild(tile);
      }
    }
 
    function buildFallbackFlagUrl(fileUrl) {
      const match = fileUrl.match(FLAGCDN_PATTERN);
      if (!match) return null;
      const code = match[1].toLowerCase();
      return `https://cdn.jsdelivr.net/npm/flag-icons@7/flags/4x3/${code}.svg`;
    }
 
    function renderFlagImage(flag) {
      dom.flagStage.style.aspectRatio = DEFAULT_ASPECT_RATIO; // reset while loading
      dom.flagFull.innerHTML = '';
 
      const img = document.createElement('img');
      img.alt = 'Flag to guess';
 
      const matchNaturalAspectRatio = () => {
        const { naturalWidth: w, naturalHeight: h } = img;
        if (w && h) dom.flagStage.style.aspectRatio = `${w} / ${h}`;
      };
 
      img.onload = matchNaturalAspectRatio;
      img.onerror = () => {
        const fallbackUrl = buildFallbackFlagUrl(flag.file);
        if (fallbackUrl && !img.dataset.fallbackTried) {
          img.dataset.fallbackTried = 'true';
          img.src = fallbackUrl;
          return;
        }
        dom.flagFull.innerHTML = `<div class="load-error">Could not load image:<br>${flag.file}</div>`;
      };
 
      img.src = flag.file;
      dom.flagFull.appendChild(img);
 
      // Handle the case where the browser served the image from cache
      // (onload may not fire for already-complete images in some browsers).
      if (img.complete && img.naturalWidth) matchNaturalAspectRatio();
    }
 
    function startNewRound() {
      if (!FLAGS.length) {
        dom.flagFull.innerHTML = '<div class="load-error">No flags configured. Add entries to the FLAGS array in the code.</div>';
        return;
      }
 
      currentFlag = FLAGS[Math.floor(Math.random() * FLAGS.length)];
      triesUsed = 0;
      isRoundOver = false;
      tileRevealOrder = shuffledIndices(TILE_COUNT);
 
      renderFlagImage(currentFlag);
      buildTiles();
 
      dom.guessCount.textContent = '0';
      dom.statusText.textContent = 'All segments hidden';
      setMessage('Which country flies this flag?');
      dom.history.innerHTML = '';
      toggleVisible(dom.revealBox, false);
      toggleVisible(dom.newGameButton, false);
 
      dom.input.value = '';
      dom.input.disabled = false;
      dom.submitButton.disabled = false;
      dom.input.focus();
    }
 
    /* =============================================================
       Tile reveal
    ============================================================= */
    function revealNextTile() {
      if (triesUsed === 0) return;
      const tileIndex = tileRevealOrder[triesUsed - 1];
      const tile = document.getElementById(`tile-${tileIndex}`);
      if (tile) tile.classList.add('flipped');
    }
 
    function revealAllTiles() {
      tileRevealOrder.forEach((tileIndex) => {
        const tile = document.getElementById(`tile-${tileIndex}`);
        if (tile) tile.classList.add('flipped');
      });
    }
 
    /* =============================================================
       Guess resolution
    ============================================================= */
    function findExactMatch(value) {
      const normalized = value.toLowerCase();
      return FLAGS.find((flag) => flag.name.toLowerCase() === normalized);
    }
 
    // If the player's partial input uniquely narrows down to a single
    // flag name, treat that as their intended answer. This lets someone
    // type "Switz" and press Enter rather than the full country name.
    function resolveUniquePrefixMatch(value) {
      const normalized = value.toLowerCase();
      const candidates = FLAGS.filter((flag) => flag.name.toLowerCase().startsWith(normalized));
      return candidates.length === 1 ? candidates[0] : null;
    }
 
    function recordGuess(displayValue, wasCorrect) {
      const entry = document.createElement('li');
      entry.innerHTML = `<span>${displayValue}</span><span class="mark">${wasCorrect ? '✓' : '✕'}</span>`;
      if (wasCorrect) entry.classList.add('correct');
      dom.history.prepend(entry);
    }
 
    function updateStatusAfterGuess() {
      dom.guessCount.textContent = triesUsed;
      const remaining = MAX_TRIES - triesUsed;
      dom.statusText.textContent = remaining <= 0
        ? 'Fully revealed'
        : `${remaining} segment${remaining === 1 ? '' : 's'} still hidden`;
    }
 
    function endRound(didWin) {
      isRoundOver = true;
      dom.input.disabled = true;
      dom.submitButton.disabled = true;
      revealAllTiles();
      dom.statusText.textContent = 'Fully revealed';
 
      streak = didWin ? streak + 1 : 0;
      renderStreak();
      writeStoredStreak(streak);
 
      setMessage(didWin ? '✓ Correct!' : '', didWin ? 'right' : 'wrong');
      dom.revealBox.innerHTML = `<div class="name">${currentFlag.name}</div><div class="region">${currentFlag.region}</div>`;
      toggleVisible(dom.revealBox, true);
      toggleVisible(dom.newGameButton, true);
    }
 
    function handleGuessSubmit(event) {
      event.preventDefault();
      if (isRoundOver) return;
 
      const rawValue = dom.input.value.trim();
      if (!rawValue) return;
 
      // Autofill: if the typed prefix uniquely identifies one flag, use its full name.
      const uniqueMatch = !findExactMatch(rawValue) && resolveUniquePrefixMatch(rawValue);
      const submittedValue = uniqueMatch ? uniqueMatch.name : rawValue;
 
      const isCorrect = submittedValue.toLowerCase() === currentFlag.name.toLowerCase();
      triesUsed += 1;
 
      recordGuess(submittedValue, isCorrect);
      dom.input.value = '';
      revealNextTile();
      updateStatusAfterGuess();
 
      if (isCorrect) {
        endRound(true);
        return;
      }
 
      if (triesUsed >= MAX_TRIES) {
        endRound(false);
      } else if (triesUsed === HINT_AFTER_TRIES) {
        setMessage(`Hint: this flag belongs to a country in ${currentFlag.region}.`, 'hint');
      } else {
        setMessage('');
      }
    }
 
    /* =============================================================
       Init
    ============================================================= */
    populateCountryList();
    renderStreak();
    dom.form.addEventListener('submit', handleGuessSubmit);
    dom.newGameButton.addEventListener('click', startNewRound);
    startNewRound();
  </script>
